{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
  <div class="row">
    <div class="col-sm-12">
      <h3>EBS 프로그램 분석</h3>
      <p class="text-muted">`tv/show` URL 또는 `courseId` 기준 분석 골격입니다.</p>
      <div class="form-group">
        <label>URL or Code</label>
        <input id="analyze_input" class="form-control" value="{{ arg.get('url_or_code', '') }}">
      </div>
      <button id="analyze_btn" class="btn btn-primary btn-sm">분석</button>
      <hr>
      <div id="analyze_result" class="alert alert-secondary">
        아직 `EbsTvClient.analyze_program_url()`이 구현되지 않았습니다.
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
$("body").on('click', '#analyze_btn', function(e){
  e.preventDefault();
  globalSendCommand('analyze_url', ($('#analyze_input').val() || '').trim(), null, null, function(ret){
    const msg = ret.msg || '분석 완료';
    $('#analyze_result').text(msg);
    notify(msg, ret.ret === 'success' ? 'success' : 'warning');
  });
});
</script>
{% endblock %}
